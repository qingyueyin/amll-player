name: 构建 AMLL Player Tauri 多端版本
on:
  push:
    branches:
      - main
      - dev
    paths-ignore:
      - "**/*.md"
      - "packages/docs/**"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  clean-pre-release:
    name: 删除预发布版本的构建产物
    runs-on: ubuntu-latest
    steps:
      - name: 删除预发布版本的构建产物
        uses: mknejp/delete-release-assets@v1
        with:
          token: ${{ github.token }}
          assets: |
            *.*
          tag: ${{ github.ref_name }}-player-dev
          fail-if-no-assets: false
          fail-if-no-release: false

  build-tauri-desktop:
    name: 构建 Tauri 桌面版本
    needs: clean-pre-release
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu-latest
            args: ""
            name: linux
            arch: x86_64
            artifact_name_suffix: linux-x64
            package_extension: tar.gz
            os_runner: ubuntu-latest
          - platform: windows-latest
            args: ""
            name: windows
            arch: x86_64
            artifact_name_suffix: windows-x64
            package_extension: zip
            os_runner: windows-latest
          - platform: windows-latest
            args: "--target aarch64-pc-windows-msvc"
            name: windows
            arch: aarch64
            artifact_name_suffix: windows-arm64
            package_extension: zip
            os_runner: windows-latest
          - platform: macos-latest # arm64 二进制包
            args: "--target aarch64-apple-darwin"
            name: macOS
            arch: aarch64
            artifact_name_suffix: macos-arm64
            package_extension: tar.gz
            os_runner: macos-14
          - platform: macos-latest # x86 二进制包
            args: "--target x86_64-apple-darwin"
            name: macOS
            arch: x86_64
            artifact_name_suffix: macos-x64
            package_extension: tar.gz
            os_runner: macos-latest

    runs-on: ${{ matrix.os_runner }}


    steps:
      - uses: actions/checkout@v4
        name: 克隆仓库
        with:
          fetch-depth: 0 # 为了正确生成开发版本号码

      - name: 安装 PNPM
        uses: pnpm/action-setup@v4

      - name: 安装 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: pnpm

      - name: 安装 Rust 工具链
        uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: stable
          targets: |
            wasm32-unknown-unknown,${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || (matrix.platform == 'windows-latest' && matrix.arch == 'aarch64') && 'aarch64-pc-windows-msvc' || '' }}

      - name: 安装系统依赖 (仅 Linux)
        if: matrix.platform == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libasound2-dev \
            libappindicator3-dev \
            libwebkit2gtk-4.1-dev \
            librsvg2-dev \
            patchelf \
            curl \
            unzip \
            tar
            
      - name: 配置 Rust 缓存
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            . -> target
          key: ${{ matrix.artifact_name_suffix }}

      # macOS 自带的 Xcode LLVM 不支持 WASM 目标
      - name: "macOS: 安装 LLVM 和 Clang"
        uses: KyleMayes/install-llvm-action@v2
        if: matrix.platform == 'macos-latest'
        with:
          version: "20"

      - name: "macOS: 设置环境变量"
        if: matrix.platform == 'macos-latest'
        run: |
          SDK_PATH=$(xcrun --show-sdk-path)
          echo "SDK Path: $SDK_PATH"
          echo "BINDGEN_EXTRA_CLANG_ARGS=-isysroot $SDK_PATH" >> $GITHUB_ENV
        shell: bash

      - name: 安装 wasm-pack
        uses: jetli/wasm-pack-action@v0.4.0
        with:
          version: "v0.14.0"

      - name: 安装 pnpm 依赖
        run: |
          pnpm i --frozen-lockfile --ignore-scripts

      - name: 生成开发构建版本号
        shell: bash
        run: |
          if [[ "${{ runner.os }}" == "macOS" ]]; then
            export PATH="/usr/bin:$PATH"
          fi
          node ./packages/player/scripts/gen-dev-version.mjs

      - name: 构建 AMLL Player 程序并发布自动构建
        uses: tauri-apps/tauri-action@v0
        with:
          projectPath: packages/player
          tagName: ${{ github.ref_name }}-player-dev
          includeUpdaterJson: true
          releaseName: AMLL Player ${{ github.ref_name }} branch development build
          releaseBody: |
            Latest ${{ github.ref_name }} branch development build.
            最新 ${{ github.ref_name }} 分支开发调试构建。
            Development version may be unstable and may not work properly, please only for test purpose.
            开发版本可能不稳定且可能无法正常工作，请仅用于测试目的。

            Latest commits (最新提交): ${{ github.event.head_commit.message }}
          prerelease: true
          args: ${{ matrix.args }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

      - name: 上传产物到 Action Artifact
        uses: actions/upload-artifact@v4
        with:
          name: AMLL Player ${{matrix.name}}-${{matrix.arch}}
          path: |
            target/**/release/bundle/**/*
            target/**/release/amll-player.exe
            target/**/release/amll-player

  build-tauri-android:
    name: 构建 Tauri 安卓版本
    needs: clean-pre-release
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        name: 克隆仓库
        with:
          fetch-depth: 0 # 为了正确生成开发版本号码

      - name: 安装 PNPM
        uses: pnpm/action-setup@v4

      - name: 安装 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: pnpm

      - name: 安装 Rust 工具链
        uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: stable
          targets: x86_64-unknown-linux-gnu,x86_64-linux-android,aarch64-linux-android

      - name: 安装 wasm-pack
        uses: jetli/wasm-pack-action@v0.4.0
        with:
          version: "v0.13.1"

      - name: 安装 wasm32 目标
        run: rustup target add wasm32-unknown-unknown

      - name: 配置 Rust 缓存
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            . -> target
            packages/player/src-tauri -> target
          key: android

      - name: 设置编译环境
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential gcc-multilib g++-multilib

      - name: 设置 Android SDK/NDK
        uses: android-actions/setup-android@v3

      - name: 安装 NDK
        run: sdkmanager --install "ndk;27.2.12479018"
        env:
          ANDROID_SDK_ROOT: /usr/local/lib/android/sdk
          
      - name: 安装 pnpm 依赖
        run: |
          pnpm i --frozen-lockfile --ignore-scripts

      - name: 生成开发构建版本号
        run: |
          node ./packages/player/scripts/gen-dev-version.mjs

      - name: 构建 AMLL Player 安卓版本
        env:
          CARGO_NDK_ANDROID_PLATFORM: 26
        run: |
          export NDK_HOME=$ANDROID_NDK_HOME
          export JAVA_HOME=$JAVA_HOME_17_X64
          pnpm -F player tauri android build --target aarch64 --target x86_64 --split-per-abi

      - name: 整理并重命名 Android 构建包
        run: |
          VERSION=$(node -p "require('./packages/player/src-tauri/tauri.conf.json').version")
          echo "Version is $VERSION"
          mkdir -p build-dist
          find packages/player/src-tauri/gen/android/app/build/outputs -name "*.apk" | while read -r apk; do
            filename=$(basename "$apk")
            if [[ "$filename" == *"arm64-v8a"* ]]; then
              new_name="AMLL.Player-${VERSION}.arm64-release-unsigned.apk"
            elif [[ "$filename" == *"x86_64"* ]]; then
              new_name="AMLL.Player-${VERSION}.x86_64-release-unsigned.apk"
            elif [[ "$filename" == *"universal"* ]]; then
              new_name="AMLL.Player-${VERSION}.universal-release-unsigned.apk"
            else
              new_name="AMLL.Player-${VERSION}.${filename}"
            fi
            cp "$apk" "build-dist/$new_name"
            echo "Copied $apk to build-dist/$new_name"
          done
          find packages/player/src-tauri/gen/android/app/build/outputs -name "*.aab" | while read -r aab; do
            cp "$aab" "build-dist/AMLL.Player-${VERSION}-release.aab"
            echo "Copied $aab to build-dist/AMLL.Player-${VERSION}-release.aab"
          done

      - name: 上传产物到 Action Artifact
        uses: actions/upload-artifact@v4
        with:
          name: AMLL Player Android Universal
          path: build-dist/*

      - name: 发布 Android 安装包至 GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}-player-dev
          prerelease: true
          files: build-dist/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-tauri-ios:
    name: 构建 Tauri iOS 版本
    needs: clean-pre-release
    runs-on: macos-14

    steps:
      - uses: actions/checkout@v4
        name: 克隆仓库
        with:
          fetch-depth: 0

      - name: 选择 Xcode 16 版本
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: "16"

      - name: 安装 PNPM
        uses: pnpm/action-setup@v4

      - name: 安装 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: pnpm

      - name: 安装 Rust 工具链与 iOS 构建目标
        uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: stable
          targets: "aarch64-apple-ios"

      - name: 配置 Rust 缓存
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            . -> target
            packages/player/src-tauri -> target
          key: ios-aarch64-only
    
      - name: 安装 pnpm 依赖
        run: |
          pnpm i --frozen-lockfile --ignore-scripts

      - name: 生成开发构建版本号
        run: |
          node ./packages/player/scripts/gen-dev-version.mjs
        env:
          AMLL_IOS_BUILD: "true"

      - name: 动态注入 iOS 构建版本号至 Info.plist
        shell: bash
        run: |
          COMMIT_COUNT=$(git rev-list --count HEAD)
          PLIST_PATH="packages/player/src-tauri/gen/apple/amll-player_iOS/Info.plist"
          /usr/libexec/PlistBuddy -c "Set :CFBundleVersion $COMMIT_COUNT" "$PLIST_PATH"
          echo "Successfully synced CFBundleVersion to $COMMIT_COUNT in Info.plist"

      - name: 构建 iOS 应用并生成无签名版 .ipa
        shell: bash
        run: |
          # 1. 尝试使用 Tauri CLI 编译 iOS 应用
          # 即使无签名构建在导出归档时可能因为没有证书报错（如 code 70），
          # 只要底层的编译产物 .app 成功生成，就可以继续打包为 ipa。
          pnpm -F player tauri ios build || echo "Tauri CLI exited with warning/error. Checking if .app was generated..."

          # 2. 动态定位编译生成的 .app 目录
          APP_PATH=$(find packages/player/src-tauri/gen/apple -name "*.app" 2>/dev/null | head -1)
          if [ -z "$APP_PATH" ]; then
            APP_PATH=$(find $HOME/Library/Developer/Xcode/DerivedData $HOME/Library/Developer/Xcode/Archives -name "*.app" 2>/dev/null | head -1)
          fi

          # 3. 校验并打包为无签名 .ipa
          if [ -n "$APP_PATH" ] && [ -d "$APP_PATH" ]; then
            echo "Successfully found compiled .app at: $APP_PATH"
            VERSION=$(node -p "require('./packages/player/src-tauri/tauri.conf.json').version")
            COMMIT_COUNT=$(git rev-list --count HEAD)
            IPA_NAME="AMLL.Player-${VERSION}+${COMMIT_COUNT}.arm64-release-unsigned.ipa"
            
            mkdir -p build/Payload
            cp -r "$APP_PATH" build/Payload/
            cd build && zip -r "../$IPA_NAME" Payload
            echo "IPA successfully created: $IPA_NAME"
          else
            echo "ERROR: Compiled .app not found. Build failed."
            exit 1
          fi

      - name: 上传无签名 ipa 包至 GitHub Action Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: AMLL Player iOS Unsigned IPA
          path: "*.ipa"

      - name: 发布 iOS 安装包至 GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}-player-dev
          prerelease: true
          files: "*.ipa"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
