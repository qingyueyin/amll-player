name: 构建 AMLL Player Tauri 多端版本
on:
  push:
    branches:
      - main
      - dev
    paths-ignore:
      - "**/*.md"
      - "packages/docs/**"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  clean-pre-release:
    name: 删除预发布版本的构建产物
    runs-on: ubuntu-latest
    steps:
      - name: 删除预发布版本的构建产物
        uses: mknejp/delete-release-assets@v1
        with:
          token: ${{ github.token }}
          assets: |
            *.*
          tag: ${{ github.ref_name }}-player-dev
          fail-if-no-assets: false
          fail-if-no-release: false

  build-tauri-desktop:
    name: 构建 Tauri 桌面版本
    needs: clean-pre-release
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu-latest
            args: ""
            name: linux
            arch: x86_64
            artifact_name_suffix: linux-x64
            package_extension: tar.gz
            os_runner: ubuntu-latest
          - platform: windows-latest
            args: ""
            name: windows
            arch: x86_64
            artifact_name_suffix: windows-x64
            package_extension: zip
            os_runner: windows-latest
          - platform: windows-latest
            args: "--target aarch64-pc-windows-msvc"
            name: windows
            arch: aarch64
            artifact_name_suffix: windows-arm64
            package_extension: zip
            os_runner: windows-latest
          - platform: macos-latest # arm64 二进制包
            args: "--target aarch64-apple-darwin"
            name: macOS
            arch: aarch64
            artifact_name_suffix: macos-arm64
            package_extension: tar.gz
            os_runner: macos-14
          - platform: macos-latest # x86 二进制包
            args: "--target x86_64-apple-darwin"
            name: macOS
            arch: x86_64
            artifact_name_suffix: macos-x64
            package_extension: tar.gz
            os_runner: macos-latest

    runs-on: ${{ matrix.os_runner }}
    env:
      BUILDER_REPO: apoint123/ffmpeg-builder
      FFMPEG_VERSION_TAG: "8.0.1"

    steps:
      - uses: actions/checkout@v4
        name: 克隆仓库
        with:
          fetch-depth: 0 # 为了正确生成开发版本号码

      - name: 安装 PNPM
        uses: pnpm/action-setup@v4

      - name: 安装 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: pnpm

      - name: 安装 Rust 工具链
        uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: stable
          targets: |
            wasm32-unknown-unknown,${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || (matrix.platform == 'windows-latest' && matrix.arch == 'aarch64') && 'aarch64-pc-windows-msvc' || '' }}

      - name: 安装系统依赖 (仅 Linux)
        if: matrix.platform == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libasound2-dev \
            libappindicator3-dev \
            libwebkit2gtk-4.1-dev \
            librsvg2-dev \
            patchelf \
            curl \
            unzip \
            tar

      - name: 下载预编译的 FFmpeg 库 (Windows)
        if: runner.os == 'Windows'
        run: |
          $packageName = "ffmpeg-${{ env.FFMPEG_VERSION_TAG }}-${{ matrix.artifact_name_suffix }}.${{ matrix.package_extension }}"
          $downloadUrl = "https://github.com/${{ env.BUILDER_REPO }}/releases/latest/download/$packageName"
          Write-Host "Downloading $packageName from $downloadUrl ..."
          Invoke-WebRequest -Uri $downloadUrl -OutFile $packageName

          mkdir -p vendor/ffmpeg
          Write-Host "Extracting $packageName ..."
          Expand-Archive -Path $packageName -DestinationPath vendor/ffmpeg_temp -Force
          Move-Item -Path vendor/ffmpeg_temp/include -Destination vendor/ffmpeg/include
          Move-Item -Path vendor/ffmpeg_temp/lib -Destination vendor/ffmpeg/lib
          Remove-Item -Recurse -Force vendor/ffmpeg_temp

          Remove-Item $packageName

          Write-Host "FFmpeg library extracted to vendor/ffmpeg"
          Get-ChildItem vendor/ffmpeg | Format-Table -AutoSize
        shell: powershell

      - name: 下载预编译的 FFmpeg 库 (Linux/macOS)
        if: runner.os != 'Windows'
        run: |
          PACKAGE_NAME="ffmpeg-${{ env.FFMPEG_VERSION_TAG }}-${{ matrix.artifact_name_suffix }}.${{ matrix.package_extension }}"
          DOWNLOAD_URL="https://github.com/${{ env.BUILDER_REPO }}/releases/latest/download/${PACKAGE_NAME}"
          echo "Downloading $PACKAGE_NAME from $DOWNLOAD_URL ..."
          curl -f -sL $DOWNLOAD_URL -o $PACKAGE_NAME

          mkdir -p vendor/ffmpeg
          echo "Extracting $PACKAGE_NAME ..."
          tar -xzf $PACKAGE_NAME -C vendor/ffmpeg
          rm $PACKAGE_NAME

          echo "FFmpeg library extracted to vendor/ffmpeg"
          ls -lR vendor/ffmpeg
        shell: bash

      - name: 设置 FFmpeg 环境变量
        run: |
          echo "FFMPEG_DIR=${{ github.workspace }}/vendor/ffmpeg" >> $GITHUB_ENV
          echo "PKG_CONFIG_PATH=${{ github.workspace }}/vendor/ffmpeg/lib/pkgconfig" >> $GITHUB_ENV
          if [[ "$RUNNER_OS" != "Windows" ]]; then
            echo "CFLAGS=-I${{ github.workspace }}/vendor/ffmpeg/include" >> $GITHUB_ENV
            echo "CXXFLAGS=-I${{ github.workspace }}/vendor/ffmpeg/include" >> $GITHUB_ENV # Also set for C++ just in case
          fi
          if [[ "${{ matrix.platform }}" == "macos-latest" ]]; then
            echo "PKG_CONFIG_PATH=/opt/homebrew/lib/pkgconfig:/usr/local/lib/pkgconfig:${{ github.workspace }}/vendor/ffmpeg/lib/pkgconfig" >> $GITHUB_ENV
          fi
        shell: bash

      - name: 配置 Rust 缓存
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            . -> target
          key: ${{ matrix.artifact_name_suffix }}

      # macOS 自带的 Xcode LLVM 不支持 WASM 目标
      - name: "macOS: 安装 LLVM 和 Clang"
        uses: KyleMayes/install-llvm-action@v2
        if: matrix.platform == 'macos-latest'
        with:
          version: "20"

      - name: "macOS: 设置环境变量"
        if: matrix.platform == 'macos-latest'
        run: |
          SDK_PATH=$(xcrun --show-sdk-path)
          echo "SDK Path: $SDK_PATH"
          echo "BINDGEN_EXTRA_CLANG_ARGS=-isysroot $SDK_PATH" >> $GITHUB_ENV
        shell: bash

      - name: 安装 wasm-pack
        uses: jetli/wasm-pack-action@v0.4.0
        with:
          version: "v0.14.0"

      - name: 安装 pnpm 依赖
        run: |
          pnpm i --frozen-lockfile --ignore-scripts
        env:
          AMLL_GITHUB_IS_ACTION: true

      - name: 生成开发构建版本号
        shell: bash
        run: |
          if [[ "${{ runner.os }}" == "macOS" ]]; then
            export PATH="/usr/bin:$PATH"
          fi
          node ./packages/player/scripts/gen-dev-version.mjs

      - name: 构建 AMLL Player 程序并发布自动构建
        uses: tauri-apps/tauri-action@v0
        with:
          projectPath: packages/player
          tagName: ${{ github.ref_name }}-player-dev
          includeUpdaterJson: true
          releaseName: AMLL Player ${{ github.ref_name }} branch development build
          releaseBody: |
            Latest ${{ github.ref_name }} branch development build.
            最新 ${{ github.ref_name }} 分支开发调试构建。
            Development version may be unstable and may not work properly, please only for test purpose.
            开发版本可能不稳定且可能无法正常工作，请仅用于测试目的。

            Latest commits (最新提交): ${{ github.event.head_commit.message }}
          prerelease: true
          args: ${{ matrix.args }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

      - name: 上传产物到 Action Artifact
        uses: actions/upload-artifact@v4
        with:
          name: AMLL Player ${{matrix.name}}-${{matrix.arch}}
          path: |
            target/**/release/bundle/**/*
            target/**/release/amll-player.exe
            target/**/release/amll-player

  build-tauri-android:
    name: 构建 Tauri 安卓版本
    needs: clean-pre-release
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        name: 克隆仓库
        with:
          fetch-depth: 0 # 为了正确生成开发版本号码

      - name: 安装 PNPM
        uses: pnpm/action-setup@v4

      - name: 安装 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: pnpm

      - name: 安装 Rust 工具链
        uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: stable
          targets:
            "x86_64-unknown-linux-gnu,x86_64-linux-android,i686-linux-android,aarc\
            h64-linux-android,arm-linux-androideabi,armv7-linux-androideabi,thu\
            mbv7neon-linux-androideabi"

      - name: 安装 wasm-pack
        uses: jetli/wasm-pack-action@v0.4.0
        with:
          version: "v0.13.1"

      - name: 安装 wasm32 目标
        run: rustup target add wasm32-unknown-unknown

      - name: 配置 Rust 缓存
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            . -> target
            packages/player/src-tauri -> target
          key: android

      - name: 安装 FFmpeg 所需系统依赖
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential yasm nasm gcc-multilib g++-multilib

      - name: 设置 Android SDK/NDK
        uses: android-actions/setup-android@v3

      - name: 安装 NDK
        run: sdkmanager --install "ndk;27.2.12479018"
        env:
          ANDROID_SDK_ROOT: /usr/local/lib/android/sdk

      - name: 下载并设置预编译的 FFmpeg 库 (Android)
        shell: bash
        env:
          BUILDER_REPO: apoint123/ffmpeg-builder
          FFMPEG_VERSION_TAG: "8.0.1"
        run: |
          declare -A targets
          targets["aarch64-linux-android"]="ffmpeg-${FFMPEG_VERSION_TAG}-android-arm64-v8a.tar.gz"
          targets["armv7-linux-androideabi"]="ffmpeg-${FFMPEG_VERSION_TAG}-android-armeabi-v7a.tar.gz"
          targets["i686-linux-android"]="ffmpeg-${FFMPEG_VERSION_TAG}-android-x86.tar.gz"
          targets["x86_64-linux-android"]="ffmpeg-${FFMPEG_VERSION_TAG}-android-x86_64.tar.gz"

          for target in "${!targets[@]}"; do
            PACKAGE_NAME="${targets[$target]}"
            DOWNLOAD_URL="https://github.com/${BUILDER_REPO}/releases/latest/download/${PACKAGE_NAME}"
            EXTRACT_DIR="${{ github.workspace }}/vendor/ffmpeg_${target}"

            echo "Downloading $PACKAGE_NAME for $target..."
            curl -f -sL $DOWNLOAD_URL -o $PACKAGE_NAME

            mkdir -p $EXTRACT_DIR
            echo "Extracting $PACKAGE_NAME to $EXTRACT_DIR..."
            tar -xzf $PACKAGE_NAME -C $EXTRACT_DIR
            rm $PACKAGE_NAME

            # 例如: FFMPEG_DIR_AARCH64_LINUX_ANDROID=/github/workspace/vendor/ffmpeg_aarch64-linux-android
            TARGET_ENV_VAR="FFMPEG_DIR_$(echo $target | tr '[:lower:]' '[:upper:]' | tr '-' '_')"
            echo "Setting $TARGET_ENV_VAR=$EXTRACT_DIR"
            echo "$TARGET_ENV_VAR=$EXTRACT_DIR" >> $GITHUB_ENV
          done

      - name: 安装 pnpm 依赖
        run: |
          pnpm i --frozen-lockfile --ignore-scripts
        env:
          AMLL_GITHUB_IS_ACTION: true

      - name: 生成开发构建版本号
        run: |
          node ./packages/player/scripts/gen-dev-version.mjs

      - name: 构建 AMLL Player 安卓版本
        env:
          CARGO_NDK_ANDROID_PLATFORM: 26
        run: |
          export NDK_HOME=$ANDROID_NDK_HOME
          export JAVA_HOME=$JAVA_HOME_17_X64
          pnpm -F player tauri android build --split-per-abi

      - name: 上传产物到 Action Artifact
        uses: actions/upload-artifact@v4
        with:
          name: AMLL Player Android Universal
          path: |
            packages/player/src-tauri/gen/android/app/build/outputs/**/*.apk
            packages/player/src-tauri/gen/android/app/build/outputs/**/*.aab

  build-tauri-ios:
    name: 构建 Tauri iOS 版本
    needs: clean-pre-release
    runs-on: macos-14

    steps:
      - uses: actions/checkout@v4
        name: 克隆仓库
        with:
          fetch-depth: 0

      - name: 选择 Xcode 16 版本
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: "16"

      - name: 安装 PNPM
        uses: pnpm/action-setup@v4

      - name: 安装 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: pnpm

      - name: 安装 Rust 工具链与 iOS 构建目标
        uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: stable
          targets: "aarch64-apple-ios"

      - name: 配置 Rust 缓存
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            . -> target
            packages/player/src-tauri -> target
          key: ios-aarch64-only

      - name: 拉取并链接 iOS 预编译 FFmpeg 静态库
        shell: bash
        env:
          BUILDER_REPO: apoint123/ffmpeg-builder
          FFMPEG_VERSION_TAG: "ffmpeg-8.0.1-cc5ef4262cfdcf5eba1e9d8b6d4020e9998c5680"
        run: |
          PACKAGE_NAME="ffmpeg-8.0.1-ios-arm64.tar.gz"
          DOWNLOAD_URL="https://github.com/${BUILDER_REPO}/releases/download/${FFMPEG_VERSION_TAG}/${PACKAGE_NAME}"
          EXTRACT_DIR="${{ github.workspace }}/vendor/ffmpeg_ios"

          echo "Downloading iOS FFmpeg static libraries from $DOWNLOAD_URL..."
          curl -f -sL $DOWNLOAD_URL -o $PACKAGE_NAME

          mkdir -p $EXTRACT_DIR
          echo "Extracting FFmpeg to $EXTRACT_DIR..."
          tar -xzf $PACKAGE_NAME -C $EXTRACT_DIR
          rm $PACKAGE_NAME

          # 设置链接编译所需的 FFMPEG_DIR 环境变量，映射真机目标
          echo "FFMPEG_DIR=$EXTRACT_DIR" >> $GITHUB_ENV
          echo "FFMPEG_DIR_AARCH64_APPLE_IOS=$EXTRACT_DIR" >> $GITHUB_ENV
          echo "FFMPEG_DIR_aarch64_apple_ios=$EXTRACT_DIR" >> $GITHUB_ENV
          echo "FFmpeg iOS environment set up successfully."

      - name: 安装 pnpm 依赖
        run: |
          pnpm i --frozen-lockfile --ignore-scripts
        env:
          AMLL_GITHUB_IS_ACTION: true

      - name: 生成开发构建版本号
        run: |
          node ./packages/player/scripts/gen-dev-version.mjs
        env:
          AMLL_IOS_BUILD: "true"

      - name: 初始化 iOS 工程并配置图标
        run: |
          pnpm -F player tauri ios init
          # 从高分辨率主图生成符合 iOS 规范的无切边专属图标集
          pnpm -F player tauri icon src-tauri/icons/512x512@2x.png
        env:
          AMLL_GITHUB_IS_ACTION: true

      - name: 禁用 Xcode 工程自动签名 (免证书构建)
        shell: bash
        run: |
          # 修改自动签名配置为手动，强制关闭代码签名校验
          PBXPROJ="packages/player/src-tauri/gen/apple/amll-player.xcodeproj/project.pbxproj"

          node -e '
            const fs = require("fs");
            const path = process.argv[1];
            let content = fs.readFileSync(path, "utf8");
            
            content = content.replace(/buildSettings = \{([\s\S]*?)\};/g, (match, body) => {
              let newBody = body
                .replace(/CODE_SIGN_STYLE = [^;]+;/g, "")
                .replace(/DEVELOPMENT_TEAM = [^;]+;/g, "")
                .replace(/CODE_SIGN_IDENTITY = [^;]+;/g, "")
                .replace(/CODE_SIGNING_ALLOWED = [^;]+;/g, "")
                .replace(/CODE_SIGNING_REQUIRED = [^;]+;/g, "")
                .replace(/PROVISIONING_PROFILE_SPECIFIER = [^;]+;/g, "")
                .split("\n")
                .filter(line => line.trim() !== "")
                .join("\n");
              
              return `buildSettings = {\n${newBody}\n\t\t\t\tCODE_SIGNING_ALLOWED = NO;\n\t\t\t\tCODE_SIGNING_REQUIRED = NO;\n\t\t\t\tCODE_SIGN_IDENTITY = "";\n\t\t\t\tCODE_SIGN_STYLE = Manual;\n\t\t\t\tDEVELOPMENT_TEAM = "";\n\t\t\t};`;
            });

            fs.writeFileSync(path, content, "utf8");
            console.log("Successfully rewrote all buildSettings in project.pbxproj to disable signing.");
          ' "$PBXPROJ"

      - name: 构建前端资源
        run: pnpm -F player build
        env:
          AMLL_GITHUB_IS_ACTION: true

      - name: 注入 iOS 后台音频播放权限 (Info.plist)
        shell: bash
        run: |
          # 在 Xcode 工程生成后，通过 PlistBuddy 写入 UIBackgroundModes=audio 权限，支持后台切歌与播放
          PLIST_PATH="packages/player/src-tauri/gen/apple/amll-player_iOS/Info.plist"
          /usr/libexec/PlistBuddy -c "Add :UIBackgroundModes array" "$PLIST_PATH" || true
          /usr/libexec/PlistBuddy -c "Add :UIBackgroundModes:0 string audio" "$PLIST_PATH" || true
          echo "Info.plist background audio modes injected."

      - name: 使用 Tauri CLI 构建无签名 iOS 应用
        shell: bash
        run: |
          # 使用 Tauri CLI 编译应用。无签名构建在导出归档时会提示报错（code 70），
          # 若底层的 *.app 已经成功生成，我们捕获该状态并作为构建成功处理。
          pnpm -F player tauri ios build || {
            echo "==== 已编译的 iOS 应用包 (.app) 路径列表 ===="
            find packages/player/src-tauri/gen/apple -name "*.app" 2>/dev/null || true
            find $HOME/Library/Developer/Xcode -name "*.app" 2>/dev/null || true
            echo "=========================================="

            APP_PATH=$(find packages/player/src-tauri/gen/apple -name "*.app" 2>/dev/null | head -1)
            if [ -z "$APP_PATH" ]; then
              APP_PATH=$(find $HOME/Library/Developer/Xcode/DerivedData $HOME/Library/Developer/Xcode/Archives -name "*.app" 2>/dev/null | head -1)
            fi
            if [ -n "$APP_PATH" ] && [ -d "$APP_PATH" ]; then
              echo "Tauri CLI exited with signing/export warning, but iOS app was compiled successfully!"
              echo "Found compiled app at: $APP_PATH"
              echo "Proceeding with manual unsigned packaging..."
            else
              echo "ERROR: Tauri CLI build failed and no compiled .app was found."
              exit 1
            fi
          }
        env:
          AMLL_GITHUB_IS_ACTION: true
          SKIP_FRONTEND_BUILD: true

      - name: 压包并生成无签名版 .ipa
        run: |
          # 动态查找编译生成的 .app 目录并打包为无签名 .ipa 产物
          APP_PATH=$(find packages/player/src-tauri/gen/apple -name "*.app" 2>/dev/null | head -1)
          if [ -z "$APP_PATH" ]; then
            APP_PATH=$(find $HOME/Library/Developer/Xcode/DerivedData $HOME/Library/Developer/Xcode/Archives -name "*.app" 2>/dev/null | head -1)
          fi
          if [ -z "$APP_PATH" ]; then
            echo "ERROR: Compiled .app not found. Listing possible locations:"
            find . -name "*.app" 2>/dev/null
            exit 1
          fi
          echo "Found: $APP_PATH"

          mkdir -p build/Payload
          cp -r "$APP_PATH" build/Payload/
          cd build && zip -r amll-player-unsigned.ipa Payload
          echo "IPA created:"
          ls -la amll-player-unsigned.ipa

      - name: 上传无签名 ipa 包至 GitHub Action Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: AMLL Player iOS Unsigned IPA
          path: build/amll-player-unsigned.ipa
